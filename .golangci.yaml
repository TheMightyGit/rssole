version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - nlreturn
    - revive
    - staticcheck
    - usestdlibvars
    - wrapcheck
    - wsl
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
